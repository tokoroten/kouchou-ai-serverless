name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request: # Dependabot 等の PR でも lint/test/build を検証する
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # PR のビルドが main のデプロイを取り消さないよう ref ごとに分ける
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    # デプロイは main への push のみ(PR ではビルド検証まで)
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
